<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Моя семья</title>
    <script src="https://unpkg.com/@maxhq/bridge@latest/dist/bridge.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 5px; text-align: left; overflow-x: auto; }
        .info { background: #e8f0fe; padding: 20px; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>👨‍👩‍👧‍👦 Мини-приложение «Моя семья»</h1>
    <div class="info" id="status">Проверка окружения...</div>

    <script>
        window.addEventListener('load', async () => {
            const statusDiv = document.getElementById('status');
            try {
                // Проверяем наличие MAXXRUNTIME
                if (window.MAXXRUNTIME && typeof window.MAXXRUNTIME.callParams === 'function') {
                    statusDiv.innerHTML = '✅ MAXXRUNTIME обнаружен. Запрашиваем параметры...';
                    const params = await window.MAXXRUNTIME.callParams();
                    statusDiv.innerHTML = `
                        <p><strong>✅ Успешно! Вы внутри MAX.</strong></p>
                        <p>Полученные параметры:</p>
                        <pre>${JSON.stringify(params, null, 2)}</pre>
                    `;
                } else {
                    statusDiv.innerHTML = `
                        <p><strong>❌ MAXXRUNTIME не обнаружен.</strong></p>
                        <p>Объект window.MAXXRUNTIME: ${window.MAXXRUNTIME}</p>
                        <p>Страница открыта вне MAX (в браузере или другом приложении).</p>
                        <p>Для теста откройте это мини-приложение через кнопку в боте внутри MAX.</p>
                    `;
                }
            } catch (e) {
                statusDiv.innerHTML = `<p><strong>❌ Ошибка при вызове MAXXRUNTIME.callParams:</strong> ${e.message}</p>`;
            }
        });
    </script>
</body>
</html>
